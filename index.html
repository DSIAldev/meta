<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MÉTA-TOUT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f2ee;--surface:#fff;--border:#e2dfd8;
    --text-primary:#1a1916;--text-muted:#a09d98;--text-secondary:#6b6860;
    --accent:#2d3546;
    --aldev:#ec2e4a;--technopole:#0f1f3d;--cci:#373cf5;--other:#4a6741;
    --free:#2e7d5e;--free-bg:#eaf4ef;
    --radius:6px;--shadow:0 1px 3px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);font-size:13px;min-height:100vh;}

  /* HEADER */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
  .header-left{display:flex;align-items:center;gap:12px;}
  .header-title{font-size:13px;font-weight:600;color:var(--text-primary);}
  .header-sub{font-size:11px;color:var(--text-muted);}
  .header-badge{background:var(--aldev);color:#fff;font-size:10px;font-weight:600;padding:3px 10px;border-radius:3px;letter-spacing:.05em;text-transform:uppercase;}

  /* BARRE DE NAVIGATION SALLES */
  .nav-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;position:sticky;top:57px;z-index:90;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .nav-section{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
  .nav-section:last-child{margin-bottom:0;}
  .nav-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;min-width:90px;}
  .nav-label.meta{color:var(--technopole);}
  .nav-label.aldev{color:var(--aldev);}
  .pills{display:flex;gap:4px;flex-wrap:wrap;}
  .pill{background:#f4f2ee;border:1.5px solid var(--border);border-radius:var(--radius);padding:4px 9px;font-size:11px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .15s ease;white-space:nowrap;font-family:'DM Sans',sans-serif;}
  .pill:hover{border-color:var(--accent);color:var(--text-primary);}
  .pill.active.meta-pill{background:var(--technopole);border-color:var(--technopole);color:#fff;}
  .pill.active.aldev-pill{background:var(--aldev);border-color:var(--aldev);color:#fff;}
  .pill .cap{opacity:.7;margin-left:3px;font-size:10px;}

  /* SELECT MOBILE */
  .select-bar{display:none;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);}
  .select-wrapper{position:relative;}
  .select-wrapper::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;font-size:12px;}
  select{width:100%;appearance:none;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 28px 8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-primary);cursor:pointer;}
  select:focus{outline:none;border-color:var(--accent);}
  @media(max-width:768px){.nav-bar{display:none;}.select-bar{display:block;}}

  /* CONTENU PRINCIPAL */
  .main{padding:20px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  /* ETAT VIDE */
  .empty-state{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:60px 20px;text-align:center;color:var(--text-muted);box-shadow:var(--shadow);}
  .empty-state .icon{font-size:2.5rem;margin-bottom:12px;}
  .empty-state h3{font-size:15px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}
  .empty-state p{font-size:12px;}

  /* CARTE SALLE */
  .room-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);animation:fadeIn .2s ease;}
  .room-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);background:#fafaf8;}
  .room-icon{width:38px;height:38px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;flex-shrink:0;}
  .room-icon.meta{background:var(--technopole);}
  .room-icon.aldev{background:var(--aldev);}
  .room-name{font-size:14px;font-weight:600;color:var(--text-primary);}
  .room-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .room-tags{display:flex;gap:6px;margin-left:auto;align-items:center;}
  .tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;letter-spacing:.04em;}
  .tag.batiment-meta{background:var(--technopole);color:#fff;}
  .tag.batiment-aldev{background:var(--aldev);color:#fff;}
  .tag.cap{background:var(--bg);border:1px solid var(--border);color:var(--text-secondary);}

  /* IFRAME */
  .iframe-wrapper{overflow:hidden;}
  iframe{width:100%;height:640px;border:none;display:block;}
  .iframe-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#fafaf8;}
  .iframe-footer span{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);}
  .btn-reserve{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s;}
  .btn-reserve:hover{opacity:.85;}

  footer{text-align:center;padding:20px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);background:var(--surface);margin-top:20px;}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="https://raw.githubusercontent.com/DSIAldev/meta/main/11-meta.jpg" alt="Métamorphose" style="height:34px;display:block;">
    <div>
      <div class="header-title">TOUTES LES SALLES</div>
      <div class="header-sub">Métamorphose &amp; Aldev</div>
    </div>
  </div>
  <span class="header-badge">MÉTA-TOUT</span>
</header>

<!-- Navigation pills desktop -->
<div class="nav-bar">
  <div class="nav-section">
    <span class="nav-label meta">Métamorphose</span>
    <div class="pills" id="pills-meta"></div>
  </div>
  <div class="nav-section">
    <span class="nav-label aldev">Aldev</span>
    <div class="pills" id="pills-aldev"></div>
  </div>
</div>

<!-- Select mobile -->
<div class="select-bar">
  <div class="select-wrapper">
    <select id="roomSelect">
      <option value="">— Choisir une salle —</option>
    </select>
  </div>
</div>

<div class="main" id="main">
  <div class="empty-state">
    <div class="icon">🏢</div>
    <h3>Sélectionnez une salle</h3>
    <p>Métamorphose (1er &amp; 7e étage) et salles Aldev (4e étage)</p>
  </div>
</div>

<footer>Angers Loire Développement &nbsp;·&nbsp; Calendriers mis à jour automatiquement</footer>

<script>
const salles = [
  // Métamorphose 1er
  { nom:"Auditorium",  etage:"1er étage", bat:"Métamorphose", cap:"200p", email:"auditorium@la-fabrique-angers.fr", url:"https://outlook.office365.com/owa/calendar/ec79f7477ffe4776a0a074cba5d86132@la-fabrique-angers.fr/8ab6e23742a34c7dbef37fb77f7721719563029404070182945/calendar.html" },
  { nom:"Le Club",     etage:"1er étage", bat:"Métamorphose", cap:"20p",  email:"leclub@la-fabrique-angers.fr",    url:"https://outlook.office365.com/owa/calendar/5434c594092144d6ba4f3751bb24cd9d@la-fabrique-angers.fr/5ef09a70adbd415da042918d0528b8593608413631019253131/calendar.html" },
  // Métamorphose 7e
  { nom:"Aubance",     etage:"7e étage",  bat:"Métamorphose", cap:"4p",   email:"aubance@la-fabrique-angers.fr",   url:"https://outlook.office365.com/owa/calendar/47caa64003ea4ec8b14558ea7b036cce@la-fabrique-angers.fr/8228029b692741038f0ce4cd36a6231517184690322135196931/calendar.html" },
  { nom:"Authion",     etage:"7e étage",  bat:"Métamorphose", cap:"10p",  email:"authion@la-fabrique-angers.fr",   url:"https://outlook.office365.com/owa/calendar/386e43ca8e1443148989aa542a7f118c@la-fabrique-angers.fr/fcc14be50d6440daadd501baf6881ff715653542258581911855/calendar.html" },
  { nom:"Confluences", etage:"7e étage",  bat:"Métamorphose", cap:"30p",  email:"confluences@la-fabrique-angers.fr",url:"https://outlook.office365.com/owa/calendar/27af79a6ecb34868b464a91f3caa021c@la-fabrique-angers.fr/aaf45c9a65fe4f03bd1d570c3026b9eb5193804746135722429/calendar.html" },
  { nom:"Layon",       etage:"7e étage",  bat:"Métamorphose", cap:"4p",   email:"layon@la-fabrique-angers.fr",     url:"https://outlook.office365.com/owa/calendar/ee0f4fed56ee413cb27a58a876103564@la-fabrique-angers.fr/a8219153e4ac4f95bd17c2eb8f28078510650499140351685678/calendar.html" },
  { nom:"Loire",       etage:"7e étage",  bat:"Métamorphose", cap:"19p",  email:"loire@la-fabrique-angers.fr",     url:"https://outlook.office365.com/owa/calendar/f9720f735c304faba8fdcd95bcfaa688@la-fabrique-angers.fr/a6bf042dfb4547589dac035e3319a9f712601122122703450143/calendar.html" },
  { nom:"Louet",       etage:"7e étage",  bat:"Métamorphose", cap:"4p",   email:"louet@la-fabrique-angers.fr",     url:"https://outlook.office365.com/owa/calendar/951370a113b845cd8096681028bc2795@la-fabrique-angers.fr/b93af82e9fdb4f378c09dd896d14df0610680814693575090329/calendar.html" },
  { nom:"Maine",       etage:"7e étage",  bat:"Métamorphose", cap:"18p",  email:"maine@la-fabrique-angers.fr",     url:"https://outlook.office365.com/owa/calendar/f08df34e74504784b294961ba3699cc6@la-fabrique-angers.fr/a9301020afc24079b2516b30b869913f13865804254518916487/calendar.html" },
  { nom:"Mayenne",     etage:"7e étage",  bat:"Métamorphose", cap:"13p",  email:"mayenne@la-fabrique-angers.fr",   url:"https://outlook.office365.com/owa/calendar/d5d82a320d364fad80401577a93b3215@la-fabrique-angers.fr/c98a7ef61397425db9307b9665a084214192016006752970091/calendar.html" },
  { nom:"Oudon",       etage:"7e étage",  bat:"Métamorphose", cap:"8p",   email:"oudon@la-fabrique-angers.fr",     url:"https://outlook.office365.com/owa/calendar/13a6455a57ee4cd9b312c662526a2d81@la-fabrique-angers.fr/42375a80c24843819d883cba87c5ae033893890819460172199/calendar.html" },
  { nom:"Sarthe",      etage:"7e étage",  bat:"Métamorphose", cap:"15p",  email:"sarthe@la-fabrique-angers.fr",    url:"https://outlook.office365.com/owa/calendar/d3d1170b6b124079b6ecc7d1399bcc93@la-fabrique-angers.fr/d6194045f0f142cc87e27d1856128eda10612498876144757076/calendar.html" },
  // Aldev 4e
  { nom:"Le Cube 4",   etage:"4e étage",  bat:"Aldev", cap:"4p",  email:"lecube4@angers-developpement.com",      url:"https://outlook.office365.com/owa/calendar/8508278a73df4dc5a4fbe918fa57c641@angers-developpement.com/ea48e4b8efae49ce885764149de0d1bd10035827758921172206/calendar.html" },
  { nom:"Le Cube 6",   etage:"4e étage",  bat:"Aldev", cap:"6p",  email:"lecube6@angers-developpement.com",      url:"https://outlook.office365.com/owa/calendar/f37e57e9c861484dbbc0c7b85d0eb428@angers-developpement.com/a5bb9122ec5043f7adc7f14b817a79b814975944164545035515/calendar.html" },
  { nom:"Le Cube 7",   etage:"4e étage",  bat:"Aldev", cap:"7p",  email:"lecube7@angers-developpement.com",      url:"https://outlook.office365.com/owa/calendar/4d5c51e1207c4333862b2bcdb914d821@angers-developpement.com/fc1eaefee43c41639a881247323a66443413721622036872355/calendar.html" },
  { nom:"Ardoisières", etage:"4e étage",  bat:"Aldev", cap:"7p",  email:"ardoisieres@angers-developpement.com",  url:"https://outlook.office365.com/owa/calendar/fce9f2faeec849d59f88c9757ec929f0@angers-developpement.com/5a282111aded4402a420c93ac6c520a313009883625753900321/calendar.html" },
  { nom:"Bessonneau",  etage:"4e étage",  bat:"Aldev", cap:"4p",  email:"bessonneau@angers-developpement.com",   url:"https://outlook.office365.com/owa/calendar/351eda3a06254752a2d432881b23a07f@angers-developpement.com/59f7963a21164359b5e7611e175b5cc018312707664465997704/calendar.html" },
  { nom:"Bouvet",      etage:"4e étage",  bat:"Aldev", cap:"4p",  email:"bouvet@angers-developpement.com",       url:"https://outlook.office365.com/owa/calendar/d0180ac65fcc4096b487fdb0c871a0c9@angers-developpement.com/7d29cb68afd94463bca50c103c708e2514872757876419082790/calendar.html" },
  { nom:"Bull",        etage:"4e étage",  bat:"Aldev", cap:"10p", email:"bull@angers-developpement.com",         url:"https://outlook.office365.com/owa/calendar/8d575b7e9e244504941c173e8f7e48bf@angers-developpement.com/b6939a22b39445788760749d68ccf93214786046692653777466/calendar.html" },
  { nom:"Courant",     etage:"4e étage",  bat:"Aldev", cap:"3p",  email:"courant@angers-developpement.com",      url:"https://outlook.office365.com/owa/calendar/addcf93a5ef1408db5bd91edb50c9cde@angers-developpement.com/98aa11b8e009414b8579446161c3329c8705848835929001161/calendar.html" },
  { nom:"Giffard",     etage:"4e étage",  bat:"Aldev", cap:"5p",  email:"giffard@angers-developpement.com",      url:"https://outlook.office365.com/owa/calendar/8e663ac93f004668bee392efae6107fd@angers-developpement.com/088b56a5011c4da0851d1ba6d53fb3a02037977738399366100/calendar.html" },
  { nom:"Scania",      etage:"4e étage",  bat:"Aldev", cap:"10p", email:"scania@angers-developpement.com",       url:"https://outlook.office365.com/owa/calendar/9d223812f1d24e01adda81b74dfcbefb@angers-developpement.com/35c7ccd67ac64b21bf62ed33c336fb6d1071265873232054571/calendar.html" },
];

// Construire pills + select
const pillsMeta  = document.getElementById('pills-meta');
const pillsAldev = document.getElementById('pills-aldev');
const sel        = document.getElementById('roomSelect');

let optMeta = document.createElement('optgroup'); optMeta.label = 'Métamorphose';
let optAldev= document.createElement('optgroup'); optAldev.label = 'Aldev';

salles.forEach((s, i) => {
  const isMeta = s.bat === 'Métamorphose';
  const pill = document.createElement('button');
  pill.className = 'pill ' + (isMeta ? 'meta-pill' : 'aldev-pill');
  pill.id = `pill-${i}`;
  pill.innerHTML = `${s.nom}<span class="cap">${s.cap}</span>`;
  pill.onclick = () => selectRoom(i);
  (isMeta ? pillsMeta : pillsAldev).appendChild(pill);

  const opt = document.createElement('option');
  opt.value = i; opt.textContent = `${s.nom} (${s.cap})`;
  (isMeta ? optMeta : optAldev).appendChild(opt);
});
sel.appendChild(optMeta); sel.appendChild(optAldev);
sel.addEventListener('change', function(){ if(this.value !== '') selectRoom(parseInt(this.value)); });

function selectRoom(idx) {
  const s = salles[idx];
  const isMeta = s.bat === 'Métamorphose';

  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  const pill = document.getElementById(`pill-${idx}`);
  if (pill) { pill.classList.add('active'); pill.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
  sel.value = idx;

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="room-card">
      <div class="room-header">
        <div class="room-icon ${isMeta ? 'meta' : 'aldev'}">${s.nom.charAt(0)}</div>
        <div>
          <div class="room-name">${s.nom}</div>
          <div class="room-meta">${s.etage} · ${s.bat}, Angers</div>
        </div>
        <div class="room-tags">
          <span class="tag ${isMeta ? 'batiment-meta' : 'batiment-aldev'}">${s.bat}</span>
          <span class="tag cap">⬩ ${s.cap}</span>
        </div>
      </div>
      <div class="iframe-wrapper">
        <iframe src="${s.url}" title="Calendrier ${s.nom}" loading="lazy"></iframe>
        <div class="iframe-footer">
          <span>${s.email}</span>
          <a class="btn-reserve" href="https://outlook.office.com/calendar/action/compose?to=${s.email}&subject=Réservation — ${s.nom}" target="_blank">+ Réserver</a>
        </div>
      </div>
    </div>`;
}
window.selectRoom = selectRoom;
</script>
</body>
</html>
